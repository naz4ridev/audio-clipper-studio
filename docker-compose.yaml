services:
  audio-clipper:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '${HOST_BIND_IP:-127.0.0.1}:${HOST_PORT:-18206}:3000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      PORT: '3000'
      HOST: 0.0.0.0
      NODE_ENV: production
      NEXT_PUBLIC_BASE_PATH: ''
    volumes:
      - audio-clipper-collection:/app/data
volumes:
  audio-clipper-collection:
